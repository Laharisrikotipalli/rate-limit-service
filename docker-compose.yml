services:
  mongo:
    image: mongo:7
    container_name: ratelimit-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: ratelimit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ratelimit-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: mongodb://mongo:27017/ratelimitdb
      REDIS_URL: redis://redis:6379
      DEFAULT_RATE_LIMIT_MAX_REQUESTS: 100
      DEFAULT_RATE_LIMIT_WINDOW_SECONDS: 60

volumes:
  mongo_data: